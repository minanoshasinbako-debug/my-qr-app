<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大人可愛い♡ Code Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.7.4/dist/quagga.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root {
            --bg: #fff5f7;
            --accent: #ff8fa3;
            --accent-soft: #ffccd5;
            --text: #5a4b4e;
            --white: #ffffff;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; }
        
        /* メインコンテナ */
        .container { background: var(--white); max-width: 450px; width: 100%; border-radius: 30px; box-shadow: 0 10px 30px rgba(255, 143, 163, 0.2); overflow: hidden; border: 2px solid var(--accent-soft); }
        
        /* タブデザイン */
        .tabs { display: flex; background: var(--accent-soft); padding: 5px; gap: 5px; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 25px; transition: 0.3s; font-size: 14px; font-weight: bold; color: var(--white); }
        .tab.active { background: var(--white); color: var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .content { padding: 25px; display: none; animation: fadeIn 0.4s ease; }
        .content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-size: 18px; text-align: center; margin-bottom: 20px; color: var(--accent); }

        /* 入力エリア */
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid var(--accent-soft); border-radius: 15px; outline: none; transition: 0.3s; color: var(--text); }
        input:focus { border-color: var(--accent); }

        /* ボタン */
        button { width: 100%; padding: 14px; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-main { background: var(--accent); color: white; box-shadow: 0 5px 15px rgba(255, 143, 163, 0.4); }
        .btn-main:active { transform: scale(0.98); box-shadow: none; }
        .btn-outline { background: var(--white); color: var(--accent); border: 2px solid var(--accent); }

        /* スキャナー */
        #interactive { width: 100%; height: 280px; background: #ffeef2; border-radius: 20px; overflow: hidden; position: relative; border: 3px solid var(--accent-soft); }
        #interactive video { width: 100%; height: 100%; object-fit: cover; }
        #result-text { margin-top: 15px; text-align: center; background: var(--bg); padding: 10px; border-radius: 12px; min-height: 24px; font-weight: bold; border: 1px dashed var(--accent); }

        /* 履歴 */
        .history-item { background: var(--bg); margin-bottom: 10px; padding: 12px; border-radius: 15px; border-left: 5px solid var(--accent); font-size: 14px; }
        .history-date { font-size: 10px; color: #a08d91; display: block; margin-top: 5px; }
        
        /* QR表示エリア */
        .output-area { margin-top: 20px; min-height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        canvas, img { border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <div class="tab active" onclick="switchTab('make', this)">つくる</div>
        <div class="tab" onclick="switchTab('scan', this)">よむ</div>
        <div class="tab" onclick="switchTab('history', this)">きろく</div>
    </div>

    <div id="make" class="content active">
        <h2>✨ コード作成</h2>
        <select id="code-type"><option value="qr">QRコード</option><option value="barcode">バーコード</option></select>
        <input type="text" id="main-input" placeholder="ここに文字をいれてね" value="https://">
        <button class="btn-main" onclick="generate()">ポチッと作成！</button>
        <div class="output-area">
            <div id="qr-out"></div>
            <svg id="barcode-svg" style="display:none;"></svg>
            <button id="dl-btn" class="btn-outline" style="display:none;" onclick="downloadCode()">画像を保存する 🌸</button>
        </div>
    </div>

    <div id="scan" class="content">
        <h2>📷 カメラでよむ</h2>
        <div id="interactive"></div>
        <div id="result-text">QRかバーコードをかざしてね</div>
        <button class="btn-main" onclick="startScan()" style="margin-top:20px;">スキャン開始</button>
    </div>

    <div id="history" class="content">
        <h2>📖 スキャン履歴</h2>
        <div id="history-list"></div>
        <button onclick="clearHistory()" style="background:none; color:#bbb; font-size:12px; text-decoration:underline;">履歴をぜんぶ消す</button>
    </div>
</div>

<script>
    let scanActive = false;

    // タブ切り替え
    function switchTab(tabId, el) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
        if(tabId === 'scan') startScan(); else stopScan();
        if(tabId === 'history') renderHistory();
    }

    // 生成
    function generate() {
        const type = document.getElementById("code-type").value;
        const val = document.getElementById("main-input").value;
        const qrOut = document.getElementById("qr-out");
        const bcSvg = document.getElementById("barcode-svg");
        const dlBtn = document.getElementById("dl-btn");

        qrOut.innerHTML = ""; bcSvg.style.display = "none";
        if (type === "qr") {
            new QRCode(qrOut, { text: val, width: 180, height: 180, colorDark: "#5a4b4e" });
        } else {
            bcSvg.style.display = "block";
            JsBarcode("#barcode-svg", val, { format: "CODE128", displayValue: true, lineColor: "#5a4b4e", background: "#ffffff00" });
        }
        dlBtn.style.display = "block";
    }

    // 履歴
    function renderHistory() {
        const list = document.getElementById("history-list");
        const history = JSON.parse(localStorage.getItem('code_history') || '[]');
        list.innerHTML = history.length ? history.map(item => `
            <div class="history-item">
                <div>${item.data.startsWith('http') ? `<a href="${item.data}" target="_blank" style="color:#ff8fa3">${item.data}</a>` : item.data}</div>
                <span class="history-date">📅 ${item.time}</span>
            </div>
        `).join('') : "<p style='text-align:center; color:#ccc;'>まだ履歴がないよ</p>";
    }

    function saveToHistory(data) {
        let history = JSON.parse(localStorage.getItem('code_history') || '[]');
        if (history[0]?.data === data) return;
        history.unshift({ data, time: new Date().toLocaleString() });
        localStorage.setItem('code_history', JSON.stringify(history.slice(0, 30)));
    }

    function clearHistory() { localStorage.removeItem('code_history'); renderHistory(); }

    // スキャン（Quagga2 + jsQR）
    function startScan() {
        if(scanActive) return; scanActive = true;
        Quagga.init({
            inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive') },
            decoder: { readers: ["code_128_reader", "ean_reader", "ean_8_reader"] }
        }, (err) => { if (!err) Quagga.start(); });

        Quagga.onDetected(res => {
            const code = res.codeResult.code;
            document.getElementById("result-text").innerText = "読み取ったよ！: " + code;
            saveToHistory(code);
        });

        const qrCheck = setInterval(() => {
            if(!scanActive) { clearInterval(qrCheck); return; }
            const video = document.querySelector("#interactive video");
            if (video?.readyState === video.HAVE_ENOUGH_DATA) {
                const canvas = document.createElement("canvas");
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(video, 0, 0);
                const result = jsQR(ctx.getImageData(0,0,canvas.width,canvas.height).data, canvas.width, canvas.height);
                if(result) {
                    document.getElementById("result-text").innerText = "読み取ったよ！: " + result.data;
                    saveToHistory(result.data);
                }
            }
        }, 400);
    }

    function stopScan() { scanActive = false; Quagga.stop(); }

    // 保存
    async function downloadCode() {
        const type = document.getElementById("code-type").value;
        let url = "";
        if (type === "qr") {
            url = document.querySelector("#qr-out img").src;
        } else {
            const svg = document.getElementById("barcode-svg");
            const canvas = document.createElement("canvas");
            const svgData = new XMLSerializer().serializeToString(svg);
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width; canvas.height = img.height;
                const ctx = canvas.getContext("2d");
                ctx.fillStyle = "white"; ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.drawImage(img, 0, 0);
                const a = document.createElement("a"); a.href = canvas.toDataURL("image/png"); a.download = "code.png"; a.click();
            };
            img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgData)));
            return;
        }
        const a = document.createElement("a"); a.href = url; a.download = "code.png"; a.click();
    }
</script>
</body>
</html>
